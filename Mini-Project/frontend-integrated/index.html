<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EcoRecycle — Sell Your Old Devices</title>
  <meta name="description"
    content="Get instant price quotes for your old phones, laptops & tablets. Free pickup, fair prices, certified recycling." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@600;700;800;900&display=swap"
    rel="stylesheet" />
  
  <!-- Global styles to hide Google Translate banner and all UI elements -->
  <style>
    /* ===== COMPREHENSIVE GOOGLE TRANSLATE HIDING ===== */
    
    /* 1. Banner Frame - All variants */
    .goog-te-banner-frame,
    #goog-te-banner-frame,
    .goog-te-balloon-frame {
      display: none !important;
      visibility: hidden !important;
      height: 0 !important;
      margin: 0 !important;
      padding: 0 !important;
      opacity: 0 !important;
    }

    /* 2. Hide Google Branding / Logos specifically */
    .goog-logo-link,
    .goog-logo-link img,
    .goog-te-gadget span {
      display: none !important;
      visibility: hidden !important;
      opacity: 0 !important;
    }

    /* 3. Gadget and Tooltip cleanup */
    .goog-te-gadget {
      color: transparent !important;
      font-size: 0 !important;
    }

    .goog-te-gadget .goog-te-combo {
      color: #334155 !important; /* Restore select text color */
      font-size: 14px !important;
      display: block !important;
    }

    .goog-te-tooltip,
    .goog-te-tooltip-small,
    .goog-te-menu-value {
      display: none !important;
    }

    /* 4. Reset Body top (Google adds top: 40px) */
    body {
      top: 0 !important;
    }

    .skiptranslate {
      display: none !important;
    }

    /* 5. Hide the floating widget if it appears */
    .goog-te-floating-widget {
      display: none !important;
    }

    /* 6. Prevent layout shift */
    html, body {
      margin: 0 !important;
      padding: 0 !important;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>

  <!-- Initialize Google Translate callback (called by translate_a/element.js) -->
  <script>
    function googleTranslateElementInit() {
      // Element will be initialized from LanguageSelector component
      // This is a fallback to ensure the callback exists
      if (typeof google !== 'undefined' && google.translate) {
        new google.translate.TranslateElement(
          {
            pageLanguage: 'en',
            includedLanguages: 'en,ta,hi,te,ml,kn,fr,es',
            autoDisplay: false,
          },
          'google_translate_element'
        )
      }
    }
  </script>
</body>

</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Screen lid -->
  <rect x="12" y="10" width="76" height="54" rx="6" ry="6" fill="#1e293b"/>
  <!-- Screen bezel inner -->
  <rect x="17" y="15" width="66" height="44" rx="3" ry="3" fill="#0ea5e9" opacity="0.12"/>
  <rect x="17" y="15" width="66" height="44" rx="3" ry="3" fill="none" stroke="#0ea5e9" stroke-width="1.5" opacity="0.6"/>
  <!-- Webcam dot -->
  <circle cx="50" cy="13" r="2" fill="#0ea5e9" opacity="0.7"/>
  <!-- Screen content -->
  <rect x="23" y="22" width="40" height="3" rx="1.5" fill="#0ea5e9" opacity="0.5"/>
  <rect x="23" y="29" width="28" height="2" rx="1" fill="#0ea5e9" opacity="0.3"/>
  <rect x="23" y="36" width="54" height="16" rx="2" fill="#0ea5e9" opacity="0.1"/>
  <rect x="23" y="55" width="18" height="4" rx="2" fill="#0891b2" opacity="0.7"/>
  <!-- Base / keyboard -->
  <path d="M8 65 L92 65 L88 78 L12 78 Z" fill="#1e293b" rx="4"/>
  <!-- Keyboard lines -->
  <rect x="18" y="68" width="64" height="2" rx="1" fill="#0ea5e9" opacity="0.2"/>
  <rect x="18" y="72" width="64" height="2" rx="1" fill="#0ea5e9" opacity="0.15"/>
  <!-- Touchpad -->
  <rect x="38" y="68.5" width="24" height="7" rx="2" fill="#0ea5e9" opacity="0.2" stroke="#0ea5e9" stroke-width="1" />
  <!-- Base bottom -->
  <rect x="5" y="78" width="90" height="5" rx="3" fill="#0f172a"/>
</svg>

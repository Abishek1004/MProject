<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Phone body -->
  <rect x="22" y="5" width="56" height="90" rx="10" ry="10" fill="#1e293b" />
  <!-- Screen -->
  <rect x="27" y="16" width="46" height="62" rx="4" ry="4" fill="#38bdf8" opacity="0.15"/>
  <rect x="27" y="16" width="46" height="62" rx="4" ry="4" fill="none" stroke="#38bdf8" stroke-width="1.5" opacity="0.6"/>
  <!-- Camera dot -->

  <!-- Home button -->
  <circle cx="50" cy="89" r="4" fill="#334155" stroke="#38bdf8" stroke-width="1.5" opacity="0.8"/>
  <!-- Screen content lines -->
  <rect x="33" y="26" width="34" height="3" rx="1.5" fill="#38bdf8" opacity="0.5"/>
  <rect x="33" y="33" width="22" height="2.5" rx="1.25" fill="#38bdf8" opacity="0.3"/>
  <rect x="33" y="44" width="34" height="20" rx="3" fill="#38bdf8" opacity="0.12"/>
  <rect x="33" y="68" width="15" height="5" rx="2.5" fill="#059669" opacity="0.8"/>
</svg>
